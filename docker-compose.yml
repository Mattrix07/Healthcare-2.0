services:
  # ---------------------------------------------------------------------------
  # FastAPI Orchestrator — fan-out/fan-in, SSE streaming, review dashboard
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Modes:
      # - RUNTIME_MODE=demo: deterministic visual demo, no API keys.
      # - RUNTIME_MODE=llm: route agents to an OpenAI-compatible LLM endpoint.
      # - RUNTIME_MODE=hosted: use Azure/hosted agent mode.
      # - RUNTIME_MODE=auto: preserve DEMO_MODE / LOCAL_LLM_MODE behaviour.
      - RUNTIME_MODE=${RUNTIME_MODE:-auto}
      - DEMO_MODE=${DEMO_MODE:-true}
      - LOCAL_LLM_MODE=${LOCAL_LLM_MODE:-false}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4.1-mini}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.2}
      - LLM_FALLBACK_TO_DEMO=${LLM_FALLBACK_TO_DEMO:-false}
      # These URLs are used only when DEMO_MODE=false, LOCAL_LLM_MODE=false,
      # and the azure-agents profile is enabled.
      - HOSTED_AGENT_CLINICAL_URL=http://agent-clinical:8088
      - HOSTED_AGENT_COVERAGE_URL=http://agent-coverage:8088
      - HOSTED_AGENT_COMPLIANCE_URL=http://agent-compliance:8088
      - HOSTED_AGENT_SYNTHESIS_URL=http://agent-synthesis:8088
      # App settings
      - FRONTEND_ORIGIN=http://localhost:3000
      # OTel sensitive-data capture (PHI risk — local dev only).
      # Uncomment in your shell or backend/.env, never commit as `true`.
      # - ENABLE_OTEL_SENSITIVE_DATA=${ENABLE_OTEL_SENSITIVE_DATA:-false}
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Clinical Reviewer Agent — ICD-10, PubMed, Clinical Trials MCP
  # Starts only when explicitly enabled: docker compose --profile azure-agents up
  # ---------------------------------------------------------------------------
  agent-clinical:
    profiles: ["azure-agents"]
    build:
      context: ./agents/clinical
      dockerfile: Dockerfile
    ports:
      - "8001:8088"
    environment:
      - AZURE_AI_PROJECT_ENDPOINT=${AZURE_AI_PROJECT_ENDPOINT}
      - AZURE_OPENAI_DEPLOYMENT_NAME=${AZURE_OPENAI_DEPLOYMENT_NAME:-gpt-5.4}
      - MCP_ICD10_CODES=${MCP_ICD10_CODES:-https://hcls.mcp.claude.com/icd10_codes/mcp}
      - MCP_PUBMED=${MCP_PUBMED:-https://pubmed.mcp.claude.com/mcp}
      - MCP_CLINICAL_TRIALS=${MCP_CLINICAL_TRIALS:-https://hcls.mcp.claude.com/clinical_trials/mcp}
      - APPLICATION_INSIGHTS_CONNECTION_STRING=${APPLICATION_INSIGHTS_CONNECTION_STRING:-}
      - ENABLE_OTEL_SENSITIVE_DATA=${ENABLE_OTEL_SENSITIVE_DATA:-false}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/readiness"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Coverage Assessment Agent — NPI Registry, CMS Coverage MCP
  # Starts only when explicitly enabled: docker compose --profile azure-agents up
  # ---------------------------------------------------------------------------
  agent-coverage:
    profiles: ["azure-agents"]
    build:
      context: ./agents/coverage
      dockerfile: Dockerfile
    ports:
      - "8002:8088"
    environment:
      - AZURE_AI_PROJECT_ENDPOINT=${AZURE_AI_PROJECT_ENDPOINT}
      - AZURE_OPENAI_DEPLOYMENT_NAME=${AZURE_OPENAI_DEPLOYMENT_NAME:-gpt-5.4}
      - MCP_NPI_REGISTRY=${MCP_NPI_REGISTRY:-https://hcls.mcp.claude.com/npi_registry/mcp}
      - MCP_CMS_COVERAGE=${MCP_CMS_COVERAGE:-https://hcls.mcp.claude.com/cms_coverage/mcp}
      - APPLICATION_INSIGHTS_CONNECTION_STRING=${APPLICATION_INSIGHTS_CONNECTION_STRING:-}
      - ENABLE_OTEL_SENSITIVE_DATA=${ENABLE_OTEL_SENSITIVE_DATA:-false}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/readiness"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Compliance Validation Agent — pure reasoning, no MCP tools
  # Starts only when explicitly enabled: docker compose --profile azure-agents up
  # ---------------------------------------------------------------------------
  agent-compliance:
    profiles: ["azure-agents"]
    build:
      context: ./agents/compliance
      dockerfile: Dockerfile
    ports:
      - "8003:8088"
    environment:
      - AZURE_AI_PROJECT_ENDPOINT=${AZURE_AI_PROJECT_ENDPOINT}
      - AZURE_OPENAI_DEPLOYMENT_NAME=${AZURE_OPENAI_DEPLOYMENT_NAME:-gpt-5.4}
      - APPLICATION_INSIGHTS_CONNECTION_STRING=${APPLICATION_INSIGHTS_CONNECTION_STRING:-}
      - ENABLE_OTEL_SENSITIVE_DATA=${ENABLE_OTEL_SENSITIVE_DATA:-false}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/readiness"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Synthesis Decision Agent — pure reasoning, no MCP tools
  # Starts only when explicitly enabled: docker compose --profile azure-agents up
  # ---------------------------------------------------------------------------
  agent-synthesis:
    profiles: ["azure-agents"]
    build:
      context: ./agents/synthesis
      dockerfile: Dockerfile
    ports:
      - "8004:8088"
    environment:
      - AZURE_AI_PROJECT_ENDPOINT=${AZURE_AI_PROJECT_ENDPOINT}
      - AZURE_OPENAI_DEPLOYMENT_NAME=${AZURE_OPENAI_DEPLOYMENT_NAME:-gpt-5.4}
      - APPLICATION_INSIGHTS_CONNECTION_STRING=${APPLICATION_INSIGHTS_CONNECTION_STRING:-}
      - ENABLE_OTEL_SENSITIVE_DATA=${ENABLE_OTEL_SENSITIVE_DATA:-false}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/readiness"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Next.js Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy